name: Post Gig Guide to Instagram

on:
  workflow_dispatch: # Manual trigger only

jobs:
  post-to-instagram:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install
          npm install puppeteer-core

      - name: Install Chrome
        uses: browser-actions/setup-chrome@latest
        with:
          chrome-version: stable

      - name: Create posting script
        run: |
          cat > postToInstagram.js << 'EOL'
          import puppeteer from 'puppeteer-core';
          import { fileURLToPath } from 'url';
          import { dirname, join } from 'path';

          const __filename = fileURLToPath(import.meta.url);
          const __dirname = dirname(__filename);

          async function postToInstagram() {
            console.log('Starting Instagram posting process...');
            
            const browser = await puppeteer.launch({
              channel: 'chrome',
              args: [
                '--no-sandbox',
                '--disable-setuid-sandbox',
                '--disable-dev-shm-usage'
              ]
            });

            try {
              const page = await browser.newPage();
              
              await page.setViewport({
                width: 540,
                height: 540,
                deviceScaleFactor: 1.9
              });

              // Navigate to the built React app
              await page.goto('file://' + join(__dirname, 'dist/index.html'), {
                waitUntil: 'networkidle0'
              });

              // Wait for the Post to Instagram button to be available
              await page.waitForSelector('button:has-text("Post to Instagram")', { timeout: 30000 });
              
              // Click the Post to Instagram button
              const postButton = await page.$('button:has-text("Post to Instagram")');
              if (!postButton) {
                throw new Error('Post to Instagram button not found');
              }
              await postButton.click();

              // Wait for posting to complete
              await page.waitForFunction(
                () => document.querySelector('.text-sm.text-gray-600')?.textContent?.includes('Successfully posted to Instagram'),
                { timeout: 120000 }
              );

              console.log('Successfully posted to Instagram');

            } catch (error) {
              console.error('Error posting to Instagram:', error);
              process.exit(1);
            } finally {
              await browser.close();
            }
          }

          postToInstagram();
          EOL

      - name: Make posting script executable
        run: chmod +x postToInstagram.js

      - name: Build React app
        run: npm run build
        env:
          VITE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          VITE_INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          VITE_SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Post to Instagram
        run: node postToInstagram.js
        env:
          VITE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          VITE_INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          VITE_SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Send Slack notification
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' --data '{
            "text": "✅ Daily gig guide has been successfully posted to Instagram!"
          }' ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Clean up temp images
        if: success()
        run: |
          # Keep only README.md in temp-images
          find temp-images/ -type f ! -name 'README.md' -delete
          
          # Commit the cleanup
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add temp-images/
          git commit -m "Clean up temp images after successful Instagram post" || echo "No changes to commit"
          git push
